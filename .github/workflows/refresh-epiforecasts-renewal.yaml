# Refresh the epiforecasts-renewal model-output from the latest upstream build.
#
# This re-runs src/parse_epiforecasts_renewal.R against the most recent
# epiforecasts/BVDOutbreakSize `results-*` release, adds the new reference_date
# to hub-config/tasks.json if needed, and opens a pull request with the result.
# Validation runs on that PR via the existing validate-submission workflow.
#
# Notable caveats:
#   * The checkout and create-pull-request steps use the REFRESH_PAT secret so
#     the refresh PR triggers the validation workflows (PRs opened with the
#     default GITHUB_TOKEN do not trigger other workflows).
#   * Metadata (model-metadata/epiforecasts-renewal.yml, incl. model_version) is
#     NOT auto-updated here - only the model-output CSV and the allowed dates.

name: Refresh epiforecasts-renewal

on:
  # Daily; adjust or remove as needed. Times are UTC.
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Upstream release tag to parse (blank = latest)"
        required: false
        default: ""
      force:
        description: "Overwrite an existing submission for the same reference_date"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-22.04
    env:
      # Read-only access for `gh release download` in the parser; the upstream
      # releases are public, so the default token suffices.
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout hub
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REFRESH_PAT }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          # The parser uses only base R (utils, stats) - no package install.
          use-public-rspm: true

      - name: Generate renewal model-output
        run: |
          set -euo pipefail
          Rscript src/parse_epiforecasts_renewal.R "${{ inputs.release_tag }}" ${{ inputs.force && '--force' || '' }}

      # The parser skips writing when the data cut-off (reference_date) has not
      # advanced, so "no file change" means there is nothing new to submit.
      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain model-output/epiforecasts-renewal)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new data cut-off; nothing to submit."
          fi

      - name: Ensure reference_date is allowed in tasks.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          # The latest (max) reference_date among the generated renewal files.
          ref_date="$(find model-output/epiforecasts-renewal -maxdepth 1 -type f -name '*-epiforecasts-renewal.csv' -printf '%f\n' \
            | sed -nE 's/^([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/p' | sort -u | tail -n1)"
          if [ -z "$ref_date" ]; then
            echo "::error title=No renewal outputs found::Could not determine reference_date from model-output/epiforecasts-renewal/*.csv"; exit 1
          fi
          echo "Latest renewal reference_date: ${ref_date}"
          if ! jq -e --arg d "$ref_date" \
              '.rounds[] | select(.round_id == "reference_date") | .model_tasks[] | .task_ids.reference_date.optional | index($d)' \
              hub-config/tasks.json > /dev/null; then
            echo "Adding ${ref_date} to allowed reference dates."
            tmp="$(mktemp)"
            jq --arg d "$ref_date" \
              '(.rounds[] | select(.round_id == "reference_date") | .model_tasks[] | .task_ids.reference_date.optional) |= (. + [$d] | unique)' \
              hub-config/tasks.json > "$tmp"
            mv "$tmp" hub-config/tasks.json
          else
            echo "${ref_date} already allowed; no tasks.json change."
          fi

      - name: Open refresh pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.REFRESH_PAT }}
          branch: auto/epiforecasts-renewal-refresh
          delete-branch: true
          commit-message: "Refresh epiforecasts-renewal model output"
          title: "Refresh epiforecasts-renewal model output"
          body: |
            Automated refresh of the `epiforecasts-renewal` model output from
            the latest `epiforecasts/BVDOutbreakSize` results release, generated
            by `src/parse_epiforecasts_renewal.R`.

            - Updates `model-output/epiforecasts-renewal/` with the current vintage.
            - Adds the new `reference_date` to `hub-config/tasks.json` if needed.

            Metadata is not auto-updated; review before merging.
          labels: |
            automated
            epiforecasts-renewal
