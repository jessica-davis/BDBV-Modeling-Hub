model_details:
  data_inputs: "DRC suspected and laboratory-confirmed BVD cases and deaths from INSP situation reports; cases and deaths exported to Uganda from WHO situation reports and Disease Outbreak News; informative priors from the McCabe et al. report; a genetic bound on the time to most recent common ancestor."
  methods: "Joint Bayesian (Turing.jl) discrete-time renewal model fitting DRC and Uganda-export surveillance streams in one posterior; estimates latent infections, Rt, ascertainment and cumulative size."
  methods_long: "Real-time joint Bayesian generative model (implemented in Julia with Turing.jl) of the 2026 DRC Bundibugyo virus disease (BVD) outbreak. The infection process is a discrete-time renewal process on a daily grid: a molecular-clock cryptic-growth phase seeds the renewal start, after which a time-varying reproduction number drives latent infections forward; infections are convolved with an incubation delay to symptom onsets, which feed the observed streams. It fits the available surveillance streams jointly in a single posterior - DRC suspected cases, suspected deaths, laboratory-confirmed cases and confirmed deaths, and the cases and deaths exported to Uganda - and infers ascertainment, the case-fatality ratio and the reproduction number. This submission reports the cumulative number of *symptomatic* cases, taken from the model's `cumulative_onsets_T` posterior (the cumulative symptom onsets by the data cut-off). This is the onset analogue of the model's `C_T` quantity (cumulative *infections*); symptomatic cases are reported here because they match the hub target (symptomatic cases, not underlying infections and not confirmed-only counts). Submissions are standardized by the hub from the upstream rolling results releases by src/parse_epiforecasts_renewal.R; the quantiles, median and mean are computed empirically from each release's `posterior_draws.csv` (thinned posterior draws). A new submission is made each time the upstream data cut-off (`as_of_date`) advances; the reference_date of each submission is the build date of the upstream release whose artifacts were used (i.e. the date the estimate was generated), which is more recent than the data cut-off. The full mapping of data cut-off to reference_date and source release is tracked, for transparency, in the committed ledger src/epiforecasts_renewal_submitted.csv. (The earliest submissions, reference_date 2026-06-13 and 2026-06-14, predate this convention and used the data cut-off as the reference_date.) Model code and analysis were drafted with the assistance of a language model and reviewed under human oversight by the named authors. See https://github.com/epiforecasts/BVDOutbreakSize for full details."
model_version: "results-798"
